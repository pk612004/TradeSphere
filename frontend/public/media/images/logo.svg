<svg width="494" height="182" viewBox="0 0 494 182" xmlns="http://www.w3.org/2000/svg">

  <!-- White Background -->
  <rect width="494" height="182" fill="#ffffff"></rect>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FC3F7"></stop>
      <stop offset="100%" stop-color="#1976D2"></stop>
    </linearGradient>
  </defs>

  <!-- Dotted Globe -->
  <g transform="translate(90,90)">
    
    <!-- Outer faint circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.25"></circle>

    <!-- Dot pattern -->
    <g fill="url(#logoGradient)">
      <!-- Upper -->
      <circle cx="-40" cy="-35" r="3"></circle>
      <circle cx="-20" cy="-45" r="3"></circle>
      <circle cx="0" cy="-50" r="3"></circle>
      <circle cx="20" cy="-45" r="3"></circle>
      <circle cx="40" cy="-35" r="3"></circle>

      <!-- Mid upper -->
      <circle cx="-50" cy="-15" r="3"></circle>
      <circle cx="-25" cy="-18" r="3"></circle>
      <circle cx="0" cy="-20" r="3"></circle>
      <circle cx="25" cy="-18" r="3"></circle>
      <circle cx="50" cy="-15" r="3"></circle>

      <!-- Mid lower -->
      <circle cx="-50" cy="15" r="3"></circle>
      <circle cx="-25" cy="18" r="3"></circle>
      <circle cx="0" cy="20" r="3"></circle>
      <circle cx="25" cy="18" r="3"></circle>
      <circle cx="50" cy="15" r="3"></circle>

      <!-- Lower -->
      <circle cx="-40" cy="35" r="3"></circle>
      <circle cx="-20" cy="45" r="3"></circle>
      <circle cx="0" cy="50" r="3"></circle>
      <circle cx="20" cy="45" r="3"></circle>
      <circle cx="40" cy="35" r="3"></circle>
    </g>

    <!-- Wave lines -->
    <path d="M -55 0 Q -15 -30 25 0 T 80 0" stroke="url(#logoGradient)" stroke-width="6" fill="none" stroke-linecap="round"></path>

    <path d="M -55 18 Q -15 -12 25 18 T 80 18" stroke="url(#logoGradient)" stroke-width="4" fill="none" stroke-linecap="round"></path>

  </g>

  <!-- Brand Name -->
  <text x="170" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="600" fill="url(#logoGradient)">
    TradeSphere
  </text>

</svg>